<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathly | Ultra Modern Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
        }

        /* Floating Background Circles */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            z-index: -1;
            animation: float 10s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-50px) scale(1.1); }
        }

        /* Glassmorphism Card */
        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            color: white;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white !important;
            padding: 12px;
            border-radius: 10px;
        }

        .form-control::placeholder { color: rgba(255, 255, 255, 0.6); }

        .btn-modern {
            background: #fff;
            color: #764ba2;
            font-weight: 600;
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .btn-modern:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            background: #f8f9fa;
        }
    </style>
</head>
<body>

    <div class="circle animate__animated animate__fadeIn" style="width: 200px; height: 200px; top: 10%; left: 10%;"></div>
    <div class="circle animate__animated animate__fadeIn" style="width: 300px; height: 300px; bottom: 5%; right: 5%; animation-delay: 2s;"></div>

    <div class="login-card animate__animated animate__zoomIn">
        <div class="text-center mb-4">
            <h1 class="fw-bold animate__animated animate__bounceInDown">PATHLY</h1>
            <p class="small opacity-75">Your journey starts with a single step.</p>
        </div>

        <div id="error-message" class="alert alert-danger border-0 bg-danger text-white py-2 text-center animate__animated animate__shakeX" style="display: none;">
        </div>

        <form id="login-form">
            <div class="mb-3">
                <input type="email" id="email" name="email" class="form-control" placeholder="Email Address" required>
            </div>
            <div class="mb-4">
                <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-modern w-100 mb-3">Login Now</button>
        </form>

        <div class="text-center small">
            <span class="opacity-75">Don't have an account?</span> 
            <a href="/signup" class="text-white fw-bold text-decoration-none">Sign Up</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-message');
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if (res.ok && data.success) {
                    window.location.href = '/dashboard';
                } else {
                    errorEl.textContent = data.error || 'Login failed';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'A network error occurred.';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>

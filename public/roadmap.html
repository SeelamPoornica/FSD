<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathly | Roadmap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        .step-card {
            border-radius: 15px;
            border-left: 6px solid #ccc;
            transition: transform 0.2s;
            background: white;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 10px;
            background: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
        .practical-box {
            background-color: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #333;
        }
        .progress-bar-custom {
            height: 12px;
            border-radius: 6px;
            background-color: #e9ecef;
            overflow: hidden;
        }
        #main-progress-bar {
            height: 100%;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body class="bg-light">

<div id="roadmap-wrapper" data-theme="#764ba2">
    
    <nav class="navbar navbar-light bg-white border-bottom py-3 sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/dashboard" id="nav-brand">← BACK TO DASHBOARD</a>
        </div>
    </nav>

    <div class="container mt-5 pb-5">
        <div class="row">
            <div class="col-lg-8">
                <h1 class="fw-bold mb-2" id="roadmap-title">Loading...</h1>
                <p class="lead text-muted mb-5" id="roadmap-desc">Please wait while the roadmap loads.</p>

                <div id="steps-container">
                    <!-- Steps will be injected here via JavaScript -->
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card border-0 shadow-sm p-4 sticky-top" style="top: 100px; border-radius: 20px;">
                    <h5 class="fw-bold mb-3">Path Progress</h5>
                    <div class="display-5 fw-bold theme-text" id="progress-percent">0%</div>
                    <div class="progress-bar-custom mt-3">
                        <div id="main-progress-bar"></div>
                    </div>
                    <p class="mt-3 text-muted small" id="progress-text">You completed 0 out of 0 days.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const pathParts = window.location.pathname.split('/');
        const roadmapId = pathParts[pathParts.length - 1];
        
        try {
            const res = await fetch(`/api/roadmap/${roadmapId}`);
            if (res.status === 401) {
                window.location.href = '/login';
                return;
            }
            if (!res.ok) {
                document.getElementById('roadmap-wrapper').innerHTML = '<div class="container mt-5"><div class="alert alert-danger">Roadmap not found or server error.</div></div>';
                return;
            }
            
            const data = await res.json();
            const { roadmap, steps, completedSteps } = data;
            
            const totalCount = steps.length > 0 ? steps.length : 1;
            const completedCount = completedSteps ? completedSteps.length : 0;
            const progressPercent = Math.round((completedCount / totalCount) * 100);
            const themeColor = roadmap.color || '#764ba2';
            
            document.title = `${roadmap.title || 'Roadmap'} | Pathly`;
            document.getElementById('roadmap-wrapper').dataset.theme = themeColor;
            document.getElementById('roadmap-title').textContent = roadmap.title;
            document.getElementById('roadmap-desc').textContent = roadmap.desc;
            
            document.getElementById('progress-percent').textContent = `${progressPercent}%`;
            document.getElementById('progress-percent').style.color = themeColor;
            document.getElementById('progress-text').textContent = `You completed ${completedCount} out of ${steps.length} days.`;
            
            const mainBar = document.getElementById('main-progress-bar');
            if(mainBar) {
                mainBar.style.width = `${progressPercent}%`;
                mainBar.style.backgroundColor = themeColor;
            }
            document.getElementById('nav-brand').style.color = themeColor;
            
            const stepsContainer = document.getElementById('steps-container');
            stepsContainer.innerHTML = '';
            
            if (steps.length > 0) {
                steps.forEach((step, index) => {
                    const dayNum = step.day || (index + 1);
                    const isDone = completedSteps.includes(dayNum.toString());
                    const btnClass = isDone ? 'btn-success' : 'btn-outline-primary';
                    const btnText = isDone ? '✓ COMPLETED' : 'MARK DONE';
                    
                    let videoHtml = '';
                    if (step.Video) {
                        videoHtml = `
                        <div class="video-container my-4 shadow-sm">
                            <iframe src="${step.Video}" frameborder="0" allowfullscreen></iframe>
                        </div>`;
                    }
                    
                    const stepHtml = `
                    <div class="step-card p-4 mb-5 shadow-sm theme-border" style="border-left-color: ${themeColor}">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div>
                                <span class="badge bg-dark mb-2">DAY ${dayNum}</span>
                                <h3 class="fw-bold theme-text" style="color: ${themeColor}">${step.Topic}</h3>
                            </div>
                            <button onclick="markComplete('${roadmapId}', '${dayNum}')" 
                                    class="btn ${btnClass} rounded-pill px-4 fw-bold">
                                ${btnText}
                            </button>
                        </div>
                        <p class="text-secondary">${step.Intro || ''}</p>
                        ${videoHtml}
                        <div class="practical-box p-3">
                            <h6 class="fw-bold small text-uppercase theme-text" style="color: ${themeColor}">Practical Challenge</h6>
                            <p class="mb-0 text-dark">${step.Practical || ''}</p>
                        </div>
                    </div>`;
                    
                    stepsContainer.innerHTML += stepHtml;
                });
            } else {
                stepsContainer.innerHTML = '<div class="alert alert-danger">No steps found for this roadmap.</div>';
            }
            
        } catch (err) {
            console.error('Error fetching roadmap:', err);
            document.getElementById('roadmap-wrapper').innerHTML = '<div class="container mt-5"><div class="alert alert-danger">An unexpected error occurred.</div></div>';
        }
    });

    async function markComplete(pathId, dayId) {
        try {
            const response = await fetch('/api/complete-step', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ pathId, dayId })
            });
            if (response.ok) {
                location.reload();
            } else {
                const text = await response.text();
                alert('Failed to update progress: ' + text);
            }
        } catch (err) {
            console.error("Failed to update progress:", err);
            alert("Network error.");
        }
    }
</script>

</body>
</html>

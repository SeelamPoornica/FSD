<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathly | Create Your Journey</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #74ebd5 0%, #acb6e5 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
        }

        /* Floating Graphics */
        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: -1;
            animation: floatShape 12s infinite ease-in-out;
        }

        @keyframes floatShape {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-60px) rotate(20deg); }
        }

        /* Modern Glass Card */
        .signup-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            color: #2d3436;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            padding: 12px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 15px rgba(116, 235, 213, 0.5);
            border-color: #74ebd5;
        }

        .btn-signup {
            background: linear-gradient(to right, #74ebd5, #9face6);
            border: none;
            color: white;
            font-weight: 600;
            padding: 12px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-signup:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .brand-logo {
            font-size: 2.5rem;
            background: linear-gradient(#2d3436, #636e72);
            -webkit-background-clip: text; 
            background-clip: text; 
            -webkit-text-fill-color: transparent;
            color: #2d3436;
        }
    </style>
</head>
<body>

    <div class="shape animate__animated animate__pulse" style="width: 150px; height: 150px; top: 15%; right: 10%; border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;"></div>
    <div class="shape animate__animated animate__pulse" style="width: 250px; height: 250px; bottom: 10%; left: 5%; border-radius: 50%;"></div>

    <div class="signup-card animate__animated animate__fadeInUp">
        <div class="text-center mb-4">
            <h1 class="brand-logo fw-bold">PATHLY</h1>
            <p class="text-secondary small">Start building your roadmap today</p>
        </div>

        <div id="error-message" class="alert alert-danger border-0 bg-danger text-white py-2 text-center animate__animated animate__headShake" style="display: none;">
        </div>

        <form id="signup-form">
            <div class="mb-3">
                <input type="text" id="username" name="username" class="form-control" placeholder="Full Name" required>
            </div>
            <div class="mb-3">
                <input type="email" id="email" name="email" class="form-control" placeholder="Email Address" required>
            </div>
            <div class="mb-4">
                <input type="password" id="password" name="password" class="form-control" placeholder="Create Password" required>
            </div>
            <button type="submit" class="btn btn-signup w-100 mb-3">Create Free Account</button>
        </form>

        <div class="text-center small">
            <span class="text-secondary">Already have a path?</span> 
            <a href="/login" class="text-primary fw-bold text-decoration-none">Login</a>
        </div>
    </div>

    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-message');
            
            try {
                const res = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                
                if (res.ok && data.success) {
                    window.location.href = '/login';
                } else {
                    errorEl.textContent = data.error || 'Signup failed';
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'A network error occurred.';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>

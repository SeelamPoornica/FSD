<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathly | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="/style.css"> 
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3 mb-4">
    <div class="container d-flex justify-content-between">
        <a class="navbar-brand fw-bold text-primary" href="#">PATHLY</a>
        <div class="d-flex align-items-center">
            <span class="me-3 fw-bold" id="user-greeting">Welcome!</span>
            <a href="/logout" class="btn btn-outline-danger btn-sm rounded-pill px-3">Logout</a>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <h2 class="fw-bold mb-4 animate__animated animate__fadeInLeft">Your Learning Paths</h2>
    
    <div class="row g-4" id="roadmaps-container">
        <!-- Roadmaps will be injected here via JavaScript -->
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        try {
            const res = await fetch('/api/dashboard');
            if (res.status === 401) {
                window.location.href = '/login';
                return;
            }
            const data = await res.json();
            
            if (data.user) {
                document.getElementById('user-greeting').textContent = `Welcome, ${data.user}!`;
            }
            
            const container = document.getElementById('roadmaps-container');
            container.innerHTML = '';
            
            if (!data.roadmaps || Object.keys(data.roadmaps).length === 0) {
                container.innerHTML = '<p class="text-muted">No roadmaps available at the moment.</p>';
                return;
            }

            for (const key of Object.keys(data.roadmaps)) {
                const roadmap = data.roadmaps[key];
                const completedCount = (data.progress && data.progress[key] ? data.progress[key] : []).length;
                const totalCount = roadmap.steps ? (Array.isArray(roadmap.steps) ? roadmap.steps.length : Object.keys(roadmap.steps).length) : 100;
                // fallback to 100 if unknown
                const finalTotal = totalCount > 0 ? totalCount : 100;
                const percentage = Math.round((completedCount / finalTotal) * 100);
                const transparentColor = (roadmap.color || '#000000') + '20';
                
                const cardHtml = `
                <div class="col-md-6 col-lg-4 animate__animated animate__fadeInUp">
                    <div class="roadmap-card h-100 p-4 d-flex flex-column" 
                         onclick="location.href='/roadmap/${key}'"
                         style="--path-color: ${roadmap.color || '#000000'}; --path-color-transparent: ${transparentColor}; cursor: pointer;">
                        
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div class="roadmap-icon-box">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                            </div>
                            <div class="roadmap-progress-circle">
                                ${percentage}%
                            </div>
                        </div>

                        <h4 class="fw-bold mb-2">${roadmap.title || 'Untitled'}</h4>
                        <p class="text-secondary small mb-4">${roadmap.desc || ''}</p>
                        
                        <div class="mt-auto">
                            <div class="custom-progress-container">
                                <div class="roadmap-progress-bar" style="--pg: ${percentage}%;"></div>
                            </div>
                            <div class="d-flex justify-content-between">
                                <small class="text-muted">${completedCount}/${finalTotal} Days</small>
                                <small class="text-primary fw-bold">Explore Path &rarr;</small>
                            </div>
                        </div>
                    </div>
                </div>`;
                container.innerHTML += cardHtml;
            }
        } catch (err) {
            console.error('Error fetching dashboard data:', err);
            document.getElementById('roadmaps-container').innerHTML = 
                '<div class="alert alert-danger">An error occurred while loading your dashboard.</div>';
        }
    });
</script>

</body>
</html>
